# External skill manifest for SF Demo Scout.
# Single source of truth for skills pulled from third-party repos.
# Edit this file to add, remove, or pin skills.
# After editing, run /sync-skills to apply.
#
# Homegrown skills (demo-*, pipeline-lessons) are NOT listed here —
# they live in the repo and update via git pull.

sources:
  jaganpro:
    repo: https://github.com/Jaganpro/sf-skills
    type: raw
    raw_base: https://raw.githubusercontent.com/Jaganpro/sf-skills/main/skills
  afv:
    repo: https://github.com/forcedotcom/afv-library
    type: clone
    branch: main
  adlc:
    repo: https://github.com/SalesforceAIResearch/agentforce-adlc
    type: clone
    branch: main

skills:
  # Jaganpro/sf-skills — raw URL fetch.
  # Use `path:` for skills that are a single SKILL.md.
  # Use `paths:` (list) when the skill ships assets/references we depend on.
  # The first entry becomes SKILL.md at the skill root; subsequent entries
  # preserve their relative path (leading "<skill-name>/" is stripped).
  - name: sf-flow
    source: jaganpro
    paths:
      - sf-flow/SKILL.md
      - sf-flow/assets/screen-flow-template.xml
      - sf-flow/assets/record-triggered-before-save.xml
      - sf-flow/assets/record-triggered-after-save.xml
      - sf-flow/assets/autolaunched-flow-template.xml
      - sf-flow/references/xml-gotchas.md
      - sf-flow/references/form-building-guide.md
      - sf-flow/references/testing-guide.md
  - name: sf-permissions
    source: jaganpro
    path: sf-permissions/SKILL.md
  - name: sf-deploy
    source: jaganpro
    path: sf-deploy/SKILL.md
  - name: sf-apex
    source: jaganpro
    path: sf-apex/SKILL.md
  - name: sf-soql
    source: jaganpro
    path: sf-soql/SKILL.md
  - name: sf-data
    source: jaganpro
    path: sf-data/SKILL.md
  - name: sf-debug
    source: jaganpro
    path: sf-debug/SKILL.md
  - name: sf-lwc
    source: jaganpro
    path: sf-lwc/SKILL.md
  - name: sf-testing
    source: jaganpro
    path: sf-testing/SKILL.md
  - name: sf-flex-estimator
    source: jaganpro
    path: sf-flex-estimator/SKILL.md

  # forcedotcom/afv-library — full skill directories, cloned
  - name: generating-custom-field
    source: afv
    path: skills/generating-custom-field
  - name: generating-custom-object
    source: afv
    path: skills/generating-custom-object
  - name: generating-permission-set
    source: afv
    path: skills/generating-permission-set

  # SalesforceAIResearch/agentforce-adlc — full skill directories, cloned
  - name: developing-agentforce
    source: adlc
    path: skills/developing-agentforce
  - name: testing-agentforce
    source: adlc
    path: skills/testing-agentforce
  - name: observing-agentforce
    source: adlc
    path: skills/observing-agentforce
