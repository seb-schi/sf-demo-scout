# External skill manifest for SF Demo Scout.
# Single source of truth for skills pulled from third-party repos.
# Edit this file to add, remove, or pin skills.
# After editing, run /sync-skills to apply.
#
# Homegrown skills (demo-*, pipeline-lessons) are NOT listed here —
# they live in the repo and update via git pull.

sources:
  jaganpro:
    repo: https://github.com/forcedotcom/afv-library
    type: clone
    branch: Jaganpro/sf-skills
  afv:
    repo: https://github.com/forcedotcom/afv-library
    type: clone
    branch: main

skills:
  # Jaganpro's sf-* skills — cloned from forcedotcom/afv-library's
  # Jaganpro/sf-skills branch (Gaurang Mathur, 2026-04-30 Slack confirmation).
  # The branch is temporary — these merge into afv-library/main over the next
  # few weeks. When that happens, collapse this into the `afv` source (see
  # pipeline-changes/afv-migration-followups.md).
  # Full directory clone picks up SKILL.md + assets/ + references/ + hooks/.
  - name: sf-flow
    source: jaganpro
    path: skills/sf-flow
  - name: sf-permissions
    source: jaganpro
    path: skills/sf-permissions
  - name: sf-deploy
    source: jaganpro
    path: skills/sf-deploy
  - name: sf-apex
    source: jaganpro
    path: skills/sf-apex
  - name: sf-soql
    source: jaganpro
    path: skills/sf-soql
  - name: sf-data
    source: jaganpro
    path: skills/sf-data
  - name: sf-debug
    source: jaganpro
    path: skills/sf-debug
  - name: sf-lwc
    source: jaganpro
    path: skills/sf-lwc
  - name: sf-testing
    source: jaganpro
    path: skills/sf-testing
  - name: sf-flex-estimator
    source: jaganpro
    path: skills/sf-flex-estimator

  # forcedotcom/afv-library — full skill directories, cloned
  - name: generating-custom-field
    source: afv
    path: skills/generating-custom-field
  - name: generating-custom-object
    source: afv
    path: skills/generating-custom-object
  - name: generating-permission-set
    source: afv
    path: skills/generating-permission-set
  - name: developing-agentforce
    source: afv
    path: skills/developing-agentforce
  - name: testing-agentforce
    source: afv
    path: skills/testing-agentforce
  - name: observing-agentforce
    source: afv
    path: skills/observing-agentforce
